services:
  ffbsg:
    build:
      context: .
    image: ffbsg:latest
    container_name: ffbsg
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 5000
    ports:
      - "127.0.0.1:8081:5000"

  caddy:
    image: caddy:2
    container_name: ffbsg-caddy
    restart: unless-stopped
    depends_on:
      - ffbsg
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
